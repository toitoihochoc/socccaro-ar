<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Camera Test</title>
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#222; }
    #video { width:100%; height:100%; object-fit:cover; }
    #status {
      position:fixed; top:50px; left:0; right:0; text-align:center;
      color:#fff; font-family:sans-serif; font-size:16px; z-index:10;
      text-shadow:0 1px 4px #000; padding:0 20px;
    }
    #startBtn {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      padding:16px 36px; font-size:18px; border:none; border-radius:999px;
      background:#fff; color:#000; font-weight:600; z-index:20;
    }
  </style>
</head>
<body>
  <div id="status">Nhan nut de test camera</div>
  <button id="startBtn">Bat camera</button>
  <video id="video" autoplay playsinline muted></video>

  <script>
    const btn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const video = document.getElementById('video');

    btn.addEventListener('click', async () => {
      btn.style.display = 'none';
      status.textContent = 'Dang xin quyen camera...';
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        video.srcObject = stream;
        status.textContent = 'Camera OK! Neu thay hinh => camera chay tot.';
        setTimeout(() => { status.textContent = ''; }, 3000);
      } catch (e) {
        status.textContent = 'LOI: ' + e.name + ' - ' + e.message;
      }
    });
  </script>
</body>
</html>
