<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Socccaro AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* Video camera cua MindAR: nam day, phu kin man hinh */
    .mindar-video, video {
      object-fit: cover;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #startScreen h1 { font-size: 20px; margin-bottom: 8px; }
    #startScreen p { font-size: 14px; opacity: 0.8; margin: 4px 0 24px; }
    #startBtn {
      padding: 14px 32px;
      font-size: 17px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-weight: 600;
    }
  </style>

  <script>
    AFRAME.registerComponent('camera-parallax', {
      tick: function () {
        const camera = document.querySelector('[camera]');
        if (!camera) return;
        const camRot = camera.object3D.rotation;
        this.el.object3D.rotation.y = camRot.y * 0.12;
        this.el.object3D.rotation.x = camRot.x * 0.08;
      }
    });
  </script>
</head>
<body>

  <div id="startScreen">
    <h1>Socccaro AR</h1>
    <p>Nhan de bat camera va huong vao anh muc tieu</p>
    <button id="startBtn">Bat dau AR</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; autoStart: false;"
    color-space="sRGB"
    embedded
    renderer="colorManagement: true, physicallyCorrectLights: true, alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <a-asset-item id="model" src="./soccaro-moon-2_5d.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#model"
        camera-parallax
        position="0 0 0"
        rotation="0 0 0"
        scale="0.35 0.35 0.35">
      </a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const startBtn = document.getElementById('startBtn');
    const startScreen = document.getElementById('startScreen');
    const sceneEl = document.querySelector('a-scene');

    startBtn.addEventListener('click', function () {
      startScreen.style.display = 'none';

      const start = () => {
        const sys = sceneEl.systems['mindar-image-system'];
        if (sys) {
          sys.start();
        }
      };

      if (sceneEl.hasLoaded) {
        start();
      } else {
        sceneEl.addEventListener('loaded', start);
      }
    });
  </script>
</body>
</html>
