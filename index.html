<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Socccaro AR</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body {
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}

#loading {

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100%;

  display:flex;

  align-items:center;
  justify-content:center;

  background:#000;

  color:white;

  font-family:Arial;

  z-index:9999;
}

</style>

<script>

AFRAME.registerComponent('camera-parallax', {

  tick: function () {

    const camera =
      document.querySelector('[camera]');

    if (!camera) return;

    const rot =
      camera.object3D.rotation;

    this.el.object3D.rotation.y =
      rot.y * 0.18;

    this.el.object3D.rotation.x =
      rot.x * 0.12;

    this.el.object3D.rotation.z =
      rot.z * 0.03;
  }

});

</script>

</head>

<body>

<div id="loading">
Loading AR...
</div>

<a-scene

mindar-image="
imageTargetSrc: ./targets.mind;
maxTrack: 1;
filterMinCF: 0.0001;
filterBeta: 1000;
"

color-space="sRGB"

renderer="
colorManagement: true;
physicallyCorrectLights: true;
"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

embedded

>

<a-assets>

<a-asset-item
id="soccaroModel"
src="./soccaro-moon-2.5d.glb"> </a-asset-item>

</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled:false"> </a-camera>

<a-entity mindar-image-target="targetIndex:0">

<a-gltf-model

src="#soccaroModel"

camera-parallax

position="0 0 0"

rotation="0 0 0"

scale="0.35 0.35 0.35"

animation__appear="
property: scale;
from: 0.01 0.01 0.01;
to: 0.35 0.35 0.35;
dur: 1200;
easing: easeOutElastic;
startEvents: targetFound;
"

animation__float="
property: position;
dir: alternate;
dur: 3500;
loop: true;
to: 0 0.03 0;
">

</a-gltf-model>

</a-entity>

</a-scene>

<script>

window.addEventListener('load', () => {

  setTimeout(() => {

    const loading =
      document.getElementById('loading');

    if (loading)
      loading.style.display = 'none';

  }, 1500);

});

</script>

</body>

</html>
