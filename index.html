<!DOCTYPE html>

<html>
<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Socccaro AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>

html,
body {

margin:0;
padding:0;

width:100%;
height:100%;

overflow:hidden;

background:black;

}

</style>

<script>

AFRAME.registerComponent('camera-parallax', {

tick: function() {

const camera =
document.querySelector('[camera]');

if (!camera) return;

const camRot =
camera.object3D.rotation;

this.el.object3D.rotation.y =
camRot.y * 0.12;

this.el.object3D.rotation.x =
camRot.x * 0.08;

}

});

</script>

</head>

<body>

<a-scene

mindar-image="
imageTargetSrc: ./targets.mind;
maxTrack: 1;
"

color-space="sRGB"

renderer="colorManagement: true"

vr-mode-ui="enabled: false"

device-orientation-permission-ui="enabled: false"

>

<a-assets>

<a-asset-item
id="model"
src="./soccaro-moon-2.5d.glb"> </a-asset-item>

</a-assets>

<a-camera
position="0 0 0"
look-controls="enabled:false"> </a-camera>

<a-entity
mindar-image-target="targetIndex: 0">

<a-gltf-model

src="#model"

camera-parallax

position="0 0 0"

rotation="0 0 0"

scale="0.35 0.35 0.35">

</a-gltf-model>

</a-entity>

</a-scene>

</body>
</html>
