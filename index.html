<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Socccaro AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    a-scene video,
    .mindar-video,
    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: -2 !important;
    }
    a-scene canvas {
      z-index: -1 !important;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
    #startScreen h1 { font-size: 20px; margin-bottom: 8px; }
    #startScreen p { font-size: 14px; opacity: 0.8; margin: 4px 0 24px; }
    #startBtn {
      padding: 14px 32px;
      font-size: 17px;
      border: none;
      border-radius: 999px;
      background: #fff;
      color: #000;
      font-weight: 600;
    }
    #errorMsg {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 16px;
      max-width: 320px;
      display: none;
    }
    #scanHint {
      position: fixed;
      bottom: 90px;
      left: 0; right: 0;
      text-align: center;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 14px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      z-index: 10;
      display: none;
    }
  </style>

  <script>
    AFRAME.registerComponent('camera-parallax', {
      tick: function () {
        const camera = document.querySelector('[camera]');
        if (!camera) return;
        const camRot = camera.object3D.rotation;
        this.el.object3D.rotation.y = camRot.y * 0.12;
        this.el.object3D.rotation.x = camRot.x * 0.08;
      }
    });
  </script>
</head>
<body>

  <div id="startScreen">
    <h1>Socccaro AR</h1>
    <p>Nhấn để bật camera và hướng vào ảnh mục tiêu</p>
    <button id="startBtn">Bắt đầu AR</button>
    <div id="errorMsg"></div>
  </div>

  <div id="scanHint">Hướng camera vào ảnh mục tiêu</div>

  <div id="scene-container"></div>

  <script>
    const startBtn = document.getElementById('startBtn');
    const startScreen = document.getElementById('startScreen');
    const errorMsg = document.getElementById('errorMsg');
    const scanHint = document.getElementById('scanHint');

    function showError(text) {
      errorMsg.style.display = 'block';
      errorMsg.textContent = text;
    }

    startBtn.addEventListener('click', async function () {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' }
        });
        stream.getTracks().forEach(t => t.stop());
      } catch (e) {
        if (e.name === 'NotAllowedError') {
          showError('Quyen camera bi tu choi. Vao Cai dat > Safari > Camera de cho phep, roi tai lai.');
        } else if (location.protocol !== 'https:') {
          showError('Camera chi chay tren HTTPS. Hay mo bang https://');
        } else {
          showError('Khong mo duoc camera: ' + e.message);
        }
        return;
      }

      startScreen.style.display = 'none';
      buildScene();
    });

    function buildScene() {
      const container = document.getElementById('scene-container');
      container.innerHTML = `
        <a-scene
          mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; autoStart: true; uiScanning: no; uiLoading: no;"
          color-space="sRGB"
          renderer="colorManagement: true; alpha: true"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false">

          <a-assets>
            <a-asset-item id="model" src="./soccaro-moon-2_5d.glb"></a-asset-item>
          </a-assets>

          <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

          <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model
              src="#model"
              camera-parallax
              position="0 0 0"
              rotation="0 0 0"
              scale="0.35 0.35 0.35">
            </a-gltf-model>
          </a-entity>
        </a-scene>
      `;

      const scene = container.querySelector('a-scene');

      scene.addEventListener('loaded', function () {
        scanHint.style.display = 'block';
      });
      scene.addEventListener('targetFound', function () {
        scanHint.style.display = 'none';
      });
      scene.addEventListener('targetLost', function () {
        scanHint.style.display = 'block';
      });
    }
  </script>
</body>
</html>
